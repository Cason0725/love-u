<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>❤️ 给最爱的你 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;font-family:"PingFang SC",sans-serif;background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffc3a0,#ffafbd);background-size:400% 400%;animation:bg 12s ease infinite;}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90%;max-width:420px;backdrop-filter:blur(20px);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:30px;padding:30px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);}
h1{color:white;margin-bottom:20px;font-size:32px}
.slider{width:260px;height:260px;margin:auto;overflow:hidden;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.slider img{width:100%;height:100%;object-fit:cover}
button{margin-top:30px;padding:15px 35px;border:none;border-radius:50px;font-size:20px;cursor:pointer}
#yes{background:white;color:#ff4d88}
#no{position:absolute;background:#999;color:white}
#page2{display:none}
.bigPhoto{width:280px;height:280px;border-radius:50%;object-fit:cover;border:8px solid rgba(255,255,255,.7);box-shadow:0 0 50px pink}
.loveText{margin-top:30px;color:white;font-size:32px}
.heart{position:absolute;color:white;animation:fall linear forwards}
@keyframes fall{from{transform:translateY(-100px) rotate(0deg);opacity:1}to{transform:translateY(110vh) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div class="card" id="page1">
<h1>我爱你 ❤️<br>你爱我吗？</h1>
<div class="slider"><img id="slide" src="1.JPG"></div>
<button id="yes">我爱你 ❤️</button>
<button id="no">我不爱你</button>
</div>
<div class="card" id="page2">
<img src="together.JPG" class="bigPhoto">
<div class="loveText" id="text"></div>
</div>
<script>
const photos=["1.JPG","2.JPG","3.JPG","4.JPG","5.JPG"];
let index=0;
setInterval(()=>{index=(index+1)%photos.length;document.getElementById("slide").src=photos[index];},2000);
setInterval(()=>{let h=document.createElement("div");h.className="heart";h.innerHTML="❤️";h.style.left=Math.random()*100+"vw";h.style.fontSize=Math.random()*25+20+"px";h.style.animationDuration=Math.random()*4+4+"s";document.body.appendChild(h);setTimeout(()=>h.remove(),8000);},200);
const no=document.getElementById("no");
function run(){let x=Math.random()*(window.innerWidth-120);let y=Math.random()*(window.innerHeight-70);no.style.left=x+"px";no.style.top=y+"px";}
no.addEventListener("mouseover",run);no.addEventListener("touchstart",e=>{e.preventDefault();run();});
document.getElementById("yes").onclick=()=>{document.getElementById("page1").style.display="none";document.getElementById("page2").style.display="block";let str="我也最爱你了 ❤️";let i=0;let timer=setInterval(()=>{document.getElementById("text").innerHTML+=str[i];i++;if(i>=str.length)clearInterval(timer);},150);};
</script>
</body>
</html>
